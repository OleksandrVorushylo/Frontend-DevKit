<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #242424;
      --text: #e8e8e8;
      --border: #3c3c3c;
      --accent: #61dafb;
      --hover: #333333;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 12px;
      font-size: 12px;
    }
    .prop-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .prop-name {
      color: #9cdcfe;
      font-family: monospace;
      width: 100px;
    }
    .prop-val {
      color: #ce9178;
      font-family: monospace;
      font-weight: bold;
      flex: 1;
    }
    .actions {
      display: flex;
      gap: 4px;
    }
    .btn {
      background: var(--hover);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 10px;
      cursor: pointer;
      line-height: 1;
    }
    .btn:hover { background: #444; color: #fff; }
    #no-selection {
      opacity: 0.6;
      text-align: center;
      padding: 20px;
    }
    .toast {
      position: fixed; max-width: 80%;
      bottom: 10px; left: 50%; transform: translateX(-50%);
      background: #4caf50; color: white; padding: 6px 10px;
      border-radius: 4px; opacity: 0; pointer-events: none;
      transition: opacity 0.2s; z-index: 100;
    }
  </style>
</head>
<body>
  <div id="no-selection">Select an element in the DOM tree</div>
  <div id="inspector-content" style="display: none;">
    <!-- Filled by panel.js -->
  </div>
  <div id="toast" class="toast">Copied!</div>
  <script src="panel.js" type="module"></script>
</body>
</html>
